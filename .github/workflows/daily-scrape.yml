name: Daily AI Model Scrape

on:
  schedule:
    # Run once daily at an off-peak time (3:17 AM UTC).
    - cron: '17 3 * * *'
  # Allow manual triggering from Actions tab
  workflow_dispatch:

permissions:
  contents: write
  
jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'scripts/requirements.txt'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt
      
      - name: Install Playwright browsers
        run: |
          playwright install chromium
      
      - name: Run scraper
        env:
          # Used by the AI gap-filling pass (scripts/gap_fill_benchmarks.py)
          # to query OpenAI's Responses API with the web_search tool.
          # If unset, the gap-filling pass is silently skipped — Pass 1 and
          # Pass 2 still run normally on the un-enriched data.
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python scripts/scrape_models.py

      - name: Run news scraper
        continue-on-error: true
        env:
          NEWSDATA_API_KEY: ${{ secrets.NEWSDATA_API_KEY }}
        run: |
          python scripts/scrape_news.py

      - name: Generate OG and IG images
        continue-on-error: true
        run: |
          python scripts/generate_og_image.py

      - name: Update sitemap lastmod dates
        run: |
          TODAY=$(date -u +'%Y-%m-%d')
          sed -i "s|<loc>https://usvschina.ai/</loc>\n\s*<lastmod>[^<]*</lastmod>|<loc>https://usvschina.ai/</loc>\n        <lastmod>${TODAY}</lastmod>|" sitemap.xml || true
          python3 -c "
          import re, sys
          today = '${TODAY}'
          with open('sitemap.xml', 'r') as f:
              content = f.read()
          # Update lastmod for dynamic pages
          dynamic = ['https://usvschina.ai/', 'https://usvschina.ai/index.html',
                     'https://usvschina.ai/history.html', 'https://usvschina.ai/models.json']
          for url in dynamic:
              pattern = f'(<loc>{re.escape(url)}</loc>\\s*<lastmod>)[^<]*(</lastmod>)'
              content = re.sub(pattern, f'\\g<1>{today}\\g<2>', content)
          with open('sitemap.xml', 'w') as f:
              f.write(content)
          print(f'Updated sitemap lastmod to {today}')
          "

      - name: Configure git
        run: |
          git config --local user.email "${{ github.repository_owner }}@users.noreply.github.com"
          git config --local user.name "${{ github.repository_owner }}"
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
      
      - name: Check for changes
        id: changes
        run: |
          CHANGES=false
          git diff --quiet models.json || CHANGES=true
          git diff --quiet news.json 2>/dev/null || CHANGES=true
          git diff --quiet sitemap.xml 2>/dev/null || CHANGES=true
          git diff --quiet og-image.png 2>/dev/null || CHANGES=true
          git diff --quiet ig-image.png 2>/dev/null || CHANGES=true
          git diff --quiet -- '*.html' 2>/dev/null || CHANGES=true
          git diff --quiet data/ai_gap_cache.json 2>/dev/null || CHANGES=true
          git diff --quiet data/ai_fill_history.jsonl 2>/dev/null || CHANGES=true
          git ls-files --others --exclude-standard | grep -q news.json && CHANGES=true
          git ls-files --others --exclude-standard | grep -q og-image.png && CHANGES=true
          git ls-files --others --exclude-standard | grep -q ig-image.png && CHANGES=true
          git ls-files --others --exclude-standard | grep -q 'data/ai_gap_cache.json' && CHANGES=true
          git ls-files --others --exclude-standard | grep -q 'data/ai_fill_history.jsonl' && CHANGES=true
          echo "has_changes=$CHANGES" >> $GITHUB_OUTPUT

      - name: Commit and push changes
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git add models.json
          git add news.json 2>/dev/null || true
          git add og-image.png 2>/dev/null || true
          git add ig-image.png 2>/dev/null || true
          git add sitemap.xml 2>/dev/null || true
          git add *.html 2>/dev/null || true
          # AI gap-fill cache + audit log are committed so the next run benefits
          # from prior cached negative responses (no wasted API calls) and the
          # audit history is visible in git log.
          git add data/ai_gap_cache.json 2>/dev/null || true
          git add data/ai_fill_history.jsonl 2>/dev/null || true
          TIMESTAMP=$(date -u +'%Y-%m-%dT%H:%M:%S')
          git commit -m "Daily scrape run - $TIMESTAMP UTC"
          git push https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/${{ github.repository }}.git main
      
      - name: Notify success
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          echo "✅ Daily scrape completed successfully"
          echo "New entry created in models.json"
      
      - name: Notify no changes
        if: steps.changes.outputs.has_changes == 'false'
        run: |
          echo "ℹ️ No changes detected - data unchanged"
