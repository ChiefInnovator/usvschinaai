name: Post to Instagram

on:
  workflow_run:
    workflows:
      - "Azure Static Web Apps CI/CD"
    types:
      - completed

jobs:
  post-instagram:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'scripts/requirements.txt'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dateutil

      - name: Wait for deployment to propagate
        run: sleep 45

      - name: Verify image is accessible
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://usvschina.ai/ig-image.png")
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "WARNING: ig-image.png not accessible (HTTP $HTTP_STATUS)"
            echo "image_ready=false" >> $GITHUB_OUTPUT
          else
            echo "Image verified accessible at https://usvschina.ai/ig-image.png"
            echo "image_ready=true" >> $GITHUB_OUTPUT
          fi
        id: verify

      - name: Post to Instagram
        if: steps.verify.outputs.image_ready == 'true'
        continue-on-error: true
        env:
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
        run: |
          if [ -n "$INSTAGRAM_ACCESS_TOKEN" ] && [ -n "$IG_USER_ID" ]; then
            python scripts/post_to_instagram.py
          else
            echo "Skipping — Instagram credentials not configured"
          fi
